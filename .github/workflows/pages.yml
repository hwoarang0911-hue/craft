name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      # Deploy the SELF-CONTAINED single-file build: all JS (and the worker) is
      # inlined into one index.html, so there is no external module to fail to
      # load on Pages and no dependence on the URL's trailing slash.
      - run: npm run build:single
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-single
      - id: deployment
        uses: actions/deploy-pages@v4
