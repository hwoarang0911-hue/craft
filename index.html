<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxelscape</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    #hud { position: fixed; inset: 0; pointer-events: none; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
    #crosshair {
      position: absolute; left: 50%; top: 50%; width: 18px; height: 18px;
      transform: translate(-50%, -50%); opacity: 0.85;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.9);
      mix-blend-mode: difference;
    }
    #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
    #crosshair::after { left: 0; top: 8px; width: 18px; height: 2px; }
    #topline {
      position: absolute; top: 10px; left: 12px; color: rgba(255,255,255,0.92);
      font-size: 13px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); letter-spacing: 0.3px;
    }
    #hotbar {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; padding: 5px 6px; border-radius: 8px;
      background: rgba(10, 14, 20, 0.45); backdrop-filter: blur(4px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .slot {
      width: 44px; height: 44px; border-radius: 6px; box-sizing: border-box;
      border: 2px solid rgba(255,255,255,0.16); background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .slot.sel { border-color: rgba(255,235,190,0.95); background: rgba(255,255,255,0.1);
      box-shadow: 0 0 10px rgba(255,220,150,0.35); }
    .slot canvas { width: 32px; height: 32px; image-rendering: pixelated; }
    .slot .key { position: absolute; top: 1px; left: 4px; font-size: 9px; color: rgba(255,255,255,0.6); }
    #blockname {
      position: absolute; bottom: 72px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.95); font-size: 14px; font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9); transition: opacity 0.6s; opacity: 0;
    }
    #hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #fff; font-size: 16px; background: rgba(8,10,16,0.6); padding: 18px 26px;
      border-radius: 10px; text-align: center; line-height: 1.7; backdrop-filter: blur(6px);
    }
    #hint b { color: #ffd98a; }
  </style>
  <script>
  /* Plain (non-module) boot watchdog. Runs even if the game module fails to
     load/parse, so a blank screen always reports WHY (on the real device). */
  (function () {
    var errShown = false;
    function box(color, msg) {
      var el = document.getElementById('boot-status');
      if (!el) {
        el = document.createElement('div');
        el.id = 'boot-status';
        el.style.cssText = 'position:fixed;left:8px;bottom:8px;z-index:99999;max-width:94vw;'
          + 'font:12px/1.45 ui-monospace,Menlo,Consolas,monospace;color:#fff;background:' + color
          + ';padding:8px 10px;border-radius:8px;white-space:pre-wrap;word-break:break-word;'
          + 'box-shadow:0 2px 10px rgba(0,0,0,.55)';
        (document.body || document.documentElement).appendChild(el);
      } else { el.style.background = color; }
      el.textContent = msg;
    }
    window.__boot = function (c, m) { if (!errShown) box(c, m); };
    function err(m) { errShown = true; box('rgba(150,0,0,.92)', m); }
    window.addEventListener('error', function (e) {
      if (e && e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
        var src = e.target.src || e.target.href || '';
        // If the dev module 404s, the raw source is being served (GitHub Pages
        // "Deploy from a branch"). Fall back to the committed self-contained
        // build, which has no external scripts. Guarded against redirect loops.
        if (/\/src\/main\.js(\?|$)/.test(src) && !/\/dist-single\//.test(location.pathname)) {
          location.replace('dist-single/index.html' + location.search);
          return;
        }
        err('✗ 리소스 로드 실패 / failed to load:\n' + src);
      } else if (e && e.message) {
        err('✗ 오류 / error:\n' + e.message + (e.filename ? ('\n@ ' + e.filename + ':' + e.lineno) : ''));
      }
    }, true);
    window.addEventListener('unhandledrejection', function (e) {
      err('✗ 오류(promise):\n' + ((e.reason && e.reason.message) || e.reason));
    });
    var gl2 = false; try { gl2 = !!document.createElement('canvas').getContext('webgl2'); } catch (_) {}
    setTimeout(function () {
      if (errShown) return;
      if (window.__bootOK) {
        box('rgba(0,110,0,.85)', '✓ 게임 JS 실행됨 / running. WebGL2=' + gl2
          + (window.__bootMeshed != null ? (' · chunks=' + window.__bootMeshed) : '')
          + '\n배경이 까many면 GPU/렌더 문제입니다 (진단용 표시).');
      } else {
        box('rgba(150,0,0,.92)', '✗ 게임 JS가 실행 안 됨 / bundle did NOT run.\nWebGL2=' + gl2
          + '\n캐시 가능성 → 시크릿 창 또는 주소 뒤에 ?v=숫자 로 다시 열어보세요.\n' + navigator.userAgent);
      }
    }, 4500);
  })();
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="crosshair" style="display:none"></div>
    <div id="topline"></div>
    <div id="blockname"></div>
    <div id="hotbar"></div>
    <div id="hint"><b>Voxelscape</b><br/>Click to play<br/>
      <span style="font-size:13px;opacity:0.8">WASD move · Space jump · Left click break · Right click place<br/>1–8 / wheel select block · 0 fly mode · Esc release mouse</span>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
